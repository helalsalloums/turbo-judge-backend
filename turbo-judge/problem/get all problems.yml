info:
  name: get all problems
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:3000/problem?page=8&limit=5
  params:
    - name: page
      value: "8"
      type: query
    - name: limit
      value: "5"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
